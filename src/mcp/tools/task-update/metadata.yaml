name: task_update
description: |
  Update a task's non-status metadata (description, priority, dependencies,
  acceptance_criteria, extensions, etc.). Wire format: PATCH /tasks/<id>.
  Use task_set_status for state transitions — the runtime rejects status,
  id, schema_version, created_at, and completed_at here.
inputSchema:
  type: object
  additionalProperties: true
  properties:
    task_id:
      type: string
      description: Canonical task ID (t_XXXXXXXX).
    description:
      type: string
    priority:
      oneOf:
        - type: integer
        - type: string
    dependencies:
      type: array
      items:
        type: string
    acceptance_criteria:
      type: array
      items:
        type: string
    outputs:
      type: array
      items:
        type: string
    extensions:
      type: object
      description: |
        Namespaced task metadata. Example:
        { "runner": { "pending_questions": [...] } }.
      additionalProperties: true
  required: [task_id]
