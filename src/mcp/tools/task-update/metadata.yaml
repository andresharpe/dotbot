name: task_update
description: |
  Update a task's non-status metadata (description, priority, dependencies,
  acceptance_criteria, extensions, etc.). Wire format: PATCH /tasks/<id>.
  Use task_set_status for state transitions — the runtime rejects status,
  id, schema_version, created_at, and completed_at here.
inputSchema:
  type: object
  additionalProperties: true
  properties:
    task_id:
      type: string
      description: Canonical task ID (t_XXXXXXXX).
    description:
      type: string
    priority:
      oneOf:
        - type: integer
        - type: string
    dependencies:
      type: array
      items:
        type: string
    acceptance_criteria:
      type: array
      items:
        type: string
    outputs:
      type: array
      items:
        type: string
    extensions:
      type: object
      description: |
        Namespaced task metadata. Example:
        { "runner": { "pending_questions": [...] } }.
        Human-input questions must use structured options; do not inline
        "Options: (A) ..." in question text.
      properties:
        runner:
          type: object
          additionalProperties: true
          properties:
            pending_question:
              type: object
              additionalProperties: true
              required: [question, options]
              properties:
                id:
                  type: string
                question:
                  type: string
                context:
                  type: string
                multi_select:
                  type: boolean
                recommendation:
                  type: string
                  enum: [A, B, C, D, E]
                options:
                  type: array
                  minItems: 2
                  maxItems: 5
                  items:
                    type: object
                    additionalProperties: true
                    required: [key, label]
                    properties:
                      key:
                        type: string
                        enum: [A, B, C, D, E]
                      label:
                        type: string
                      rationale:
                        type: string
            pending_questions:
              type: array
              maxItems: 4
              items:
                type: object
                additionalProperties: true
                required: [question, options]
                properties:
                  id:
                    type: string
                  question:
                    type: string
                  context:
                    type: string
                  multi_select:
                    type: boolean
                  recommendation:
                    type: string
                    enum: [A, B, C, D, E]
                  options:
                    type: array
                    minItems: 2
                    maxItems: 5
                    items:
                      type: object
                      additionalProperties: true
                      required: [key, label]
                      properties:
                        key:
                          type: string
                          enum: [A, B, C, D, E]
                        label:
                          type: string
                        rationale:
                          type: string
      additionalProperties: true
  required: [task_id]
