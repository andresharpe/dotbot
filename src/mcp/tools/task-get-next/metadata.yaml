name: task_get_next
description: |
  Return the next runnable task. The runtime picks the highest-priority task
  whose status matches the request (default 'todo') with optional filtering
  by parent WorkflowRun.
inputSchema:
  type: object
  properties:
    status:
      type: string
      description: Status to draw candidates from. Defaults to 'todo'. Set 'analysed' to ask for the next ready-to-execute task instead.
    run_id:
      type: string
      description: Restrict the search to tasks under a specific WorkflowRun.
