name: kickstart-from-scratch
version: "3.5"
description: >-
  Full kickstart workflow — creates product documents for new projects
  (via interview) or existing codebases (via repo scan), then generates
  architectural decisions, task groups, and an expanded roadmap.
min_dotbot_version: "3.5"

form:
  modes:
    - id: new_project
      condition:
        - "!.bot/workspace/product/mission.md"
        - "!.git/refs/heads/*"
      label: "New Project"
      description: "Describe your project and let Claude create your foundational product documents — mission, tech stack, and entity model."
      button: "KICKSTART PROJECT"
      prompt_placeholder: "What are you building? What problem does it solve? What technologies are you using?"
      show_interview: true
      show_files: true

    - id: existing_code
      condition:
        - "!.bot/workspace/product/mission.md"
        - ".git/refs/heads/*"
      label: "Existing Project"
      description: "Let Claude scan your codebase and generate foundational product documents — mission, tech stack, and entity model."
      button: "ANALYSE PROJECT"
      prompt_placeholder: "Optional: describe what to focus on or any context about the project"
      show_interview: false
      show_files: false

    - id: has_docs
      condition: ".bot/workspace/product/mission.md"
      hidden: true

requires: {}

tasks:
  - name: "Analyse Project"
    type: prompt
    workflow: "00-analyse-project.md"
    condition: ".git/refs/heads/*"
    outputs: ["mission.md", "tech-stack.md", "entity-model.md"]
    commit:
      paths: ["workspace/product/"]
      message: "chore(analyse): product documents from codebase scan"
    priority: 0

  - name: "Product Documents"
    type: prompt
    workflow: "01-plan-product.md"
    condition: "!.git/refs/heads/*"
    outputs: ["mission.md", "tech-stack.md", "entity-model.md"]
    front_matter_docs: ["mission.md", "tech-stack.md", "entity-model.md"]
    commit:
      paths: ["workspace/product/"]
      message: "chore(kickstart): phase 1 — product documents"
    priority: 0

  - name: "Generate Decisions"
    type: prompt
    workflow: "01b-generate-decisions.md"
    depends_on: ["Product Documents", "Analyse Project"]
    commit:
      paths: ["workspace/decisions/"]
      message: "chore(kickstart): phase 1b — architectural decisions"
    priority: 2

  - name: "Task Groups"
    type: prompt
    workflow: "03a-plan-task-groups.md"
    depends_on: ["Generate Decisions"]
    outputs: ["task-groups.json"]
    post_script: "post-phase-task-groups.ps1"
    commit:
      paths: ["workspace/product/"]
      message: "chore(kickstart): phase 2a — task groups and roadmap"
    priority: 3

  - name: "Task Group Expansion"
    type: script
    script: "expand-task-groups.ps1"
    depends_on: ["Task Groups"]
    commit:
      paths: ["workspace/tasks/"]
      message: "chore(kickstart): phase 2b — expanded task roadmap"
    priority: 4
