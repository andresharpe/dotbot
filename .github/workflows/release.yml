name: Release & Publish

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  ARCHIVE_PREFIX: dotbot

jobs:
  # ── Gate: run tests before releasing ────────────────────────
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install PowerShell (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if ! command -v pwsh &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y powershell
          fi

      - name: Install PowerShell (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if ! command -v pwsh &> /dev/null; then
            brew install powershell/tap/powershell
          fi

      - name: Install powershell-yaml
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PSRepository -Default
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force -ErrorAction SilentlyContinue | Out-Null
          try {
            Install-Module -Name powershell-yaml -Repository PSGallery -Scope CurrentUser -Force -AllowClobber
          } catch {
            Write-Host "Install-Module failed, trying Install-PSResource..."
            if (-not (Get-Module -ListAvailable -Name Microsoft.PowerShell.PSResourceGet)) {
              Install-Module Microsoft.PowerShell.PSResourceGet -Scope CurrentUser -Force -AllowClobber
            }
            Import-Module Microsoft.PowerShell.PSResourceGet
            Install-PSResource -Name powershell-yaml -Repository PSGallery -TrustRepository -Scope CurrentUser -Reinstall
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests (layers 1-3)
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File tests/Run-Tests.ps1 -Layer all

  # ── Build release archives ─────────────────────────────────
  release:
    name: Create GitHub Release
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha256_tar: ${{ steps.hashes.outputs.sha256_tar }}
      sha256_zip: ${{ steps.hashes.outputs.sha256_zip }}
    steps:
      - uses: actions/checkout@v4

      - name: Install PowerShell
        run: |
          if ! command -v pwsh &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y powershell
          fi

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate version matches version.json
        shell: pwsh
        run: |
          $expected = "${{ steps.version.outputs.version }}"
          $actual = (Get-Content version.json | ConvertFrom-Json).version
          if ($expected -ne $actual) {
            Write-Error "Tag version ($expected) does not match version.json ($actual)"
            exit 1
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Studio UI
        working-directory: src/studio-ui
        run: npm ci && npm run build

      - name: Build archives
        # v4 ships the framework as a git checkout: `git clone` + `pwsh
        # bootstrap.ps1` + `$env:DOTBOT_HOME = $PWD`. The release archive
        # is therefore a full repo snapshot (minus .git/), with the
        # pre-built studio-ui assets overlaid so users don't need Node
        # to run the framework.
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          STAGING="${ARCHIVE_PREFIX}-${VERSION}"

          # rsync copies the working tree into staging, skipping .git/, build
          # caches, and node_modules. studio-ui/static is gitignored but lives
          # outside the exclude list so the just-built assets land in the
          # archive.
          mkdir "$STAGING"
          rsync -a \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='**/node_modules/' \
            --exclude='src/studio-ui/.vite/' \
            --exclude='.bot/' \
            --exclude="/${STAGING}/" \
            --exclude="${ARCHIVE_PREFIX}-*.tar.gz" \
            --exclude="${ARCHIVE_PREFIX}-*.zip" \
            --exclude="${ARCHIVE_PREFIX}-*.sha256" \
            ./ "$STAGING/"

          tar czf "${STAGING}.tar.gz" "$STAGING"
          zip -r "${STAGING}.zip" "$STAGING" > /dev/null

      - name: Compute SHA256
        id: hashes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "sha256_tar=$(sha256sum ${ARCHIVE_PREFIX}-${VERSION}.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sha256_zip=$(sha256sum ${ARCHIVE_PREFIX}-${VERSION}.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          sha256sum ${ARCHIVE_PREFIX}-${VERSION}.tar.gz > ${ARCHIVE_PREFIX}-${VERSION}.tar.gz.sha256
          sha256sum ${ARCHIVE_PREFIX}-${VERSION}.zip > ${ARCHIVE_PREFIX}-${VERSION}.zip.sha256

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE=$(mktemp)
          cat >"$NOTES_FILE" <<'EOF'
          ## Install

          ```bash
          # Clone the repo (or extract the archive) and run bootstrap once:
          git clone --branch v${{ steps.version.outputs.version }} https://github.com/andresharpe/dotbot ~/dotbot
          pwsh ~/dotbot/bootstrap.ps1

          # Point DOTBOT_HOME at the checkout for every shell:
          export DOTBOT_HOME="$HOME/dotbot"      # bash / zsh / sh
          # or, on Windows: setx DOTBOT_HOME "$HOME\dotbot"
          ```

          Migrating from an older copy-based install? See [MIGRATING.md](MIGRATING.md).

          ## Changes

          EOF
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file "$NOTES_FILE" \
            --generate-notes \
            "${ARCHIVE_PREFIX}-${VERSION}.tar.gz" \
            "${ARCHIVE_PREFIX}-${VERSION}.zip" \
            "${ARCHIVE_PREFIX}-${VERSION}.tar.gz.sha256" \
            "${ARCHIVE_PREFIX}-${VERSION}.zip.sha256"

  # The legacy PowerShell Gallery publish job was retired in v4:
  # `Install-Module Dotbot` shipped a copy-based installer that no
  # longer makes sense once the framework is a git checkout pointed
  # at by $env:DOTBOT_HOME. The deprecation note lives in
  # MIGRATING.md §7.
